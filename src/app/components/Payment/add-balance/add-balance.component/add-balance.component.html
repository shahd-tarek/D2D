<div class="animate-fade">
  <h1 class="page-main-title">Add Balance</h1>
  
  <div class="wallet-card">
    <h2 class="balance-title">Your Balance</h2>
    <p class="balance-amount">EGP {{ balance | number:'1.2-2' }}</p>

    <div class="grid-payment-container">
      <div class="payment-methods-column">
        <p class="input-label">Please Choose Your Preferred Payment Method</p>
        
        <div class="methods-list">
          <label class="method-item" [class.selected]="selectedMethod === 'meeza'">
            <div class="method-details">
              <img src="visa.png" alt="Meeza" class="method-logo" onerror="this.style.display='none'">
              <span class="method-text-name">Meeza</span>
            </div>
            <input type="radio" name="pm" value="meeza" [(ngModel)]="selectedMethod" class="custom-radio">
          </label>

          <label class="method-item" [class.selected]="selectedMethod === 'paypal'">
            <div class="method-details">
              <img src="paypal.png" alt="PayPal" class="method-logo" onerror="this.style.display='none'">
              <span class="method-text-name">PayPal</span>
            </div>
            <input type="radio" name="pm" value="paypal" [(ngModel)]="selectedMethod" class="custom-radio">
          </label>

          <label class="method-item" [class.selected]="selectedMethod === 'mastercard'">
            <div class="method-details">
              <img src="pay.png" alt="Apple Pay" class="method-logo" onerror="this.style.display='none'">
              <span class="method-text-name">Apple Pay</span>
            </div>
            <input type="radio" name="pm" value="mastercard" [(ngModel)]="selectedMethod" class="custom-radio">
          </label>

          <label class="method-item" [class.selected]="selectedMethod === 'vodafone'">
            <div class="method-details">
              <img src="vod.png" alt="Vodafone Cash" class="method-logo" onerror="this.style.display='none'">
              <span class="method-text-name">Vodafone Cash</span>
            </div>
            <input type="radio" name="pm" value="vodafone" [(ngModel)]="selectedMethod" class="custom-radio">
          </label>
        </div>
      </div>

      <div class="invoice-summary-card">
        <h3 class="summary-title">Amount to Add</h3>
        <div class="summary-row">
          <span>Amount</span>
          <span class="font-bold">EGP {{ amount | number:'1.2-2' }}</span>
        </div>
        <div class="summary-row">
          <span>Payment gateway fees</span>
          <span>EGP {{ gatewayFees | number:'1.2-2' }}</span>
        </div>
        <div class="summary-total-row">
          <span>Total</span>
          <span class="summary-total-value">EGP {{ totalAmount | number:'1.2-2' }}</span>
        </div>
      </div>
    </div>

    <div class="action-buttons-container">
      <button (click)="back.emit()" class="btn-secondary">Back</button>
      <button (click)="continue.emit()" class="btn-primary-dark">Continue</button>
    </div>
  </div>
</div>
