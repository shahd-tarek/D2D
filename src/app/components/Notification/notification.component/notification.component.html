<div class="page-wrapper">
  <div class="notifications-page-container">
    <header class="page-header">
      <h1>Notifications</h1>
      <p>Stay updated with your latest activity.</p>
    </header>

    <div class="controls-bar">
      <div class="filter-tabs">
        <button (click)="activeFilter = 'all'" [class.active]="activeFilter === 'all'">
          All ({{ allNotifications.length }})
        </button>
        <button (click)="activeFilter = 'unread'" [class.active]="activeFilter === 'unread'">
          Unread ({{ unreadCount }})
        </button>
        
        <div class="dropdown-filter">
          <button class="btn-filter">
            <span>Filter</span>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M6 9l6 6 6-6"/>
            </svg>
          </button>
        </div>
      </div>

      <button (click)="markAllAsRead()" class="btn-mark-all">Mark all as read</button>
    </div>

    <div class="notifications-full-list">
      @for (notification of filteredNotifications; track notification.title) {
        <app-notification-item [data]="notification"></app-notification-item>
      } @empty {
        <div class="empty-state">No notifications found.</div>
      }
    </div>
  </div>
</div>
